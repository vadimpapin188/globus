<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стать партнёром Глобуса</title>
    <style>
        /* Основные стили */
        body {
            font-family: sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #2c3e50;
            font-size: 24px;
            text-align: center;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        /* Поля формы */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box; /* Чтобы отступы не раздували ширину */
        }

        /* Кнопка */
        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        .success-message {
            display: none;
            color: #27ae60;
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Партнёрство с Глобусом</h1>
    <p>Помоги нам стать лучше! Выбери роль и оставь свои данные.</p>

    <form id="partnerForm">
        <div class="form-group">
            <label for="name">Твоё имя:</label>
            <input type="text" id="name" placeholder="Как тебя зовут?" required>
        </div>

        <div class="form-group">
            <label for="role">Кем хочешь стать?</label>
            <select id="role">
                <option value="tester">Тестировщик (искать ошибки)</option>
                <option value="idea">Идеист (предлагать функции)</option>
                <option value="both">И то, и другое</option>
            </select>
        </div>

        <div class="form-group">
            <label for="contact">Контакт для связи:</label>
            <input type="text" id="contact" placeholder="Номер телефона или электронная почта" required>
        </div>

        <div class="form-group">
            <label for="message">Почему хочешь помочь?</label>
            <textarea id="message" rows="3" placeholder="Пару слов о себе..."></textarea>
        </div>

        <button type="submit">Отправить заявку</button>
    </form>

    <div id="status" class="success-message">Заявка отправлена! Мы свяжемся с тобой.</div>
</div>

<script>
    document.getElementById('partnerForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Чтобы страница не перезагружалась

        // Собираем данные
        const name = document.getElementById('name').value;
        const role = document.getElementById('role').value;
        const contact = document.getElementById('contact').value;

        // В будущем здесь можно настроить отправку на сервер или в Telegram
        console.log("Новая заявка:", { name, role, contact });

        // Показываем сообщение об успехе
        document.getElementById('partnerForm').style.display = 'none';
        document.getElementById('status').style.display = 'block';
    });
</script>

</body>
</html>
