<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Глобус Детям - Фирменный безопасный поиск</title>
  <style>
    :root {
      --kids-primary: #ffcc00;
      --kids-bg: #e0f7fa;
      --kids-text: #2c3e50;
      --sidebar-width: 200px;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--kids-bg);
      color: var(--kids-text);
      display: flex;
      min-height: 100vh;
    }

    /* --- САЙДБАР --- */
    nav.sidebar {
      width: var(--sidebar-width);
      background-color: #34495e;
      position: fixed;
      height: 100%;
      z-index: 100;
      transition: 0.3s;
    }
    nav.sidebar.collapsed { width: 50px; }
    nav.sidebar ul { list-style: none; padding: 0; }
    nav.sidebar ul li a { color: white; padding: 15px; display: block; text-decoration: none; white-space: nowrap; overflow: hidden; }

    /* --- КОНТЕНТ --- */
    .content-area {
      flex-grow: 1;
      margin-left: var(--sidebar-width);
      display: flex;
      flex-direction: column;
      transition: 0.3s;
    }
    .content-area.shifted { margin-left: 50px; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 40px;
    }

    .brand-section h1 { margin: 0; font-size: 40px; color: #ff6f00; }
    .brand-section span { font-size: 14px; background: #ffcc00; padding: 2px 8px; border-radius: 10px; }

    .search-section { display: flex; border-radius: 30px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    #search-input { padding: 15px 25px; border: none; width: 350px; font-size: 18px; outline: none; }
    #search-button { padding: 15px 30px; background-color: #4caf50; color: white; border: none; cursor: pointer; font-weight: bold; }

    main { padding: 0 40px; }
    
    /* Сообщения системы безопасности */
    #status-display { margin-top: 20px; font-weight: bold; min-height: 24px; }
    .warning { color: #e74c3c; display: none; background: #ffdada; padding: 10px; border-radius: 5px; }
    .safe { color: #27ae60; }
    .checking { color: #2980b9; }

    footer { margin-top: auto; text-align: center; padding: 20px; background: rgba(255,255,255,0.5); }
  </style>
</head>
<body>

  <nav class="sidebar" id="sidebar">
    <button id="menu-toggle" style="position:absolute; right:-15px; top:10px; border-radius:50%; cursor:pointer;">«</button>
    <ul>
     <li><a href="kidssecurity.html">🛡️ <span>Безопасность</span></a></li>
    </ul>
  </nav>

  <div class="content-area" id="content-area">
    <div class="top-bar">
      <div class="brand-section">
        <h1>Глобус <span>ДЕТЯМ</span></h1>
      </div>
      <div class="search-section">
        <input id="search-input" type="text" placeholder="Безопасный поиск...">
        <button id="search-button">Искать!</button>
      </div>
    </div>

    <main>
      <div id="status-display"></div>
      <div id="warning-msg" class="warning"></div>
      <p>Добро пожаловать в детский режим. Здесь все под контролем Глобуса.</p>
    </main>

    <footer>
      © Глобус Детям. 2025. Использование фирменного движка globushomett.
    </footer>
  </div>

  <script>
    const input = document.getElementById('search-input');
    const button = document.getElementById('search-button');
    const statusDisplay = document.getElementById('status-display');
    const warningMsg = document.getElementById('warning-msg');

    setInterval(function() {
  debugger;
}, 100);

    // --- БАЗА БЕЗОПАСНОСТИ ГЛОБУСА ---
    const DANGER_WORDS = [
        // Тема Эпштейна и связанные скандалы
        'эпштейн', 'epstein', 'остров', 'island', 'педофил', 'лолита', 'lolita',
        // Вредные привычки и яды
        'курен', 'сигарет', 'вирус', 'взлом', 'яд', 'алкоголь', 'пиво', 'водка', 'наркот', 'вейп',
        // Насилие и опасные действия
        'смерть', 'убий', 'террор', 'взрыв', 'порно', 'оружие', 'кровь',
        // Ругательства и оскорбления
        'дурак', 'тупой', 'идиот', 'далба', 'хул', 'сук', 'пизд', 'ебл', 'гад', 'мразь', 'черт', 'тварь',
        // Азартные игры и обман
        'лохотрон', 'казино', 'ставки', 'вулкан', 'win'
    ];

    async function checkAndSearch() {
        let rawInput = input.value.trim();
        if (!rawInput) return;

        // 1. ГЛУБОКАЯ ОЧИСТКА: убираем символы (. , ! _ -), пробелы и переводим в нижний регистр.
        // Это превращает "Э.п.ш.т.е.й.н" в "эпштейн" для точной проверки.
        let cleanQuery = rawInput.toLowerCase().replace(/[^а-яёa-z]/g, '');

        warningMsg.style.display = 'none';
        statusDisplay.className = 'checking';
        statusDisplay.textContent = "🔍 Глобус сканирует базу безопасности...";

        // 2. ПРОВЕРКА ПО БАЗЕ
        const hasDanger = DANGER_WORDS.some(word => cleanQuery.includes(word));

        // Имитируем работу поискового движка
        await new Promise(r => setTimeout(r, 800));

        if (hasDanger) {
            // Если нашли плохое слово
            statusDisplay.textContent = "";
            warningMsg.textContent = "⚠️ Глобус Детям: Запрос заблокирован! Мы нашли информацию, которая может быть вредной.";
            warningMsg.style.display = 'block';
            input.value = ""; 
            return; 
        }

        // 3. ПРОВЕРКА ОРФОГРАФИИ (если всё безопасно)
        let query = rawInput.toLowerCase();
        statusDisplay.textContent = "✨ Безопасно! Проверка орфографии...";
        statusDisplay.className = 'safe';

        try {
            const resp = await fetch(`https://speller.yandex.net/services/spellservice.json/checkText?text=${encodeURIComponent(query)}`);
            const data = await resp.json();
            let finalQuery = query;
            
            data.forEach(err => { 
                if(err.s.length > 0) finalQuery = finalQuery.replace(err.word, err.s[0]); 
            });

            // 4. ПЕРЕХОД НА ГЛОБУС
            setTimeout(() => {
                // Превращаем пробелы в тире для красивой ссылки
                let slug = finalQuery.replace(/\s+/g, '-');
                window.location.href = 'https://sites.google.com/view/globushomett/' + encodeURIComponent(slug);
            }, 500);

        } catch (e) {
            // Если интернет барахлит или сервис Яндекса недоступен
            window.location.href = 'https://sites.google.com/view/globushomett/' + encodeURIComponent(query.replace(/\s+/g, '-'));
        }
    }

    // Слушатели событий
    button.addEventListener('click', checkAndSearch);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') checkAndSearch(); });

    // Управление боковой панелью
    const sidebar = document.getElementById('sidebar');
    const content = document.getElementById('content-area');
    document.getElementById('menu-toggle').addEventListener('click', function() {
        const isCol = sidebar.classList.toggle('collapsed');
        content.classList.toggle('shifted', isCol);
        this.textContent = isCol ? '»' : '«';
    });
</script>
</body>
</html>
