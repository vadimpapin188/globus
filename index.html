<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Глобус | Поисковая система, AI-ассистент и не только!</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <style>
    :root {
      --primary-color: #C0C0C0; 
      --secondary-color: #ffffff;
      --background-color: #051937; 
      --sidebar-bg: #1a2a3a;
      --sidebar-width: 200px;
      --header-height: 70px; /* Высота верхнего баннера */
      --footer-banner-height: 35px; /* Высота баннера метрики */
    }

    body { 
        margin: 0; 
        font-family: Arial, sans-serif; 
        background-color: var(--background-color); 
        color: var(--secondary-color); 
        display: flex; 
        min-height: 100vh; 
        overflow-x: hidden;
        padding-top: var(--header-height); /* Отступ под баннер */
    }

    /* ВЕРХНИЙ БАННЕР */
    header.header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: var(--header-height);
        background-color: black;
        color: white;
        text-align: center;
        z-index: 1001;
        display: flex;
        flex-direction: column;
        justify-content: center;
        border-bottom: 1px solid var(--primary-color);
    }
    header.header h1 { margin: 0; font-size: 18px; color: var(--primary-color); }
    header.header p { margin: 2px 0 0; font-size: 13px; }

    /* САЙДБАР */
    nav.sidebar { 
        width: var(--sidebar-width); 
        background-color: var(--sidebar-bg); 
        color: white; 
        position: fixed; 
        top: var(--header-height);
        height: calc(100% - var(--header-height)); 
        padding-top: 10px; 
        box-sizing: border-box; 
        z-index: 100; 
        transition: width 0.3s; 
    }
    nav.sidebar.collapsed { width: 50px; }
    nav.sidebar ul { list-style-type: none; padding: 0; margin: 0; }
    nav.sidebar ul li a { color: white; padding: 10px; display: block; text-decoration: none; white-space: nowrap; overflow: hidden; font-size: 14px; }
    nav.sidebar ul li a:hover { background-color: var(--primary-color); }
    
    #menu-toggle { position: absolute; top: 5px; right: -25px; background-color: var(--primary-color); color: white; border: none; padding: 5px 8px; cursor: pointer; border-radius: 5px; font-size: 12px; }
    
    .content-area { flex-grow: 1; margin-left: var(--sidebar-width); display: flex; flex-direction: column; transition: margin-left 0.3s; padding-bottom: var(--footer-banner-height); }
    .content-area.shifted { margin-left: 50px; }
    
    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background-color: rgba(255, 255, 255, 0.05); }
    .brand-section h1 { color: var(--primary-color); font-size: 40px; margin: 0; }
    
    .search-section { display: flex; gap: 10px; }
    #search-input { padding: 10px 15px; border: 1px solid #aaa; width: 300px; border-radius: 4px; }
    #search-button { padding: 10px 20px; background-color: var(--primary-color); color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
    
    main { padding: 40px; flex-grow: 1; z-index: 10; }
    footer { text-align: center; padding: 15px; background-color: #222; color: #888; font-size: 12px; margin-bottom: var(--footer-banner-height); }

    /* НИЖНИЙ БАННЕР МЕТРИКИ */
    .metrika-banner {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: var(--footer-banner-height);
        background: rgba(0, 0, 0, 0.85);
        color: #ccc;
        font-size: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1001;
        border-top: 1px solid #333;
    }
    .metrika-banner b { color: #007bff; margin-right: 5px; }

    /* Стили ссылок и блоков */
    .recommended-sites { margin-bottom: 30px; }
    .recommended-sites h2 { font-size: 24px; color: var(--primary-color); margin-bottom: 15px; }
    .sites-list { display: flex; gap: 10px; flex-wrap: wrap; }
    .site-link { background: rgba(255, 255, 255, 0.1); color: white; padding: 8px 15px; border-radius: 20px; text-decoration: none; border: 1px solid var(--primary-color); transition: 0.3s; font-size: 13px; }
    .site-link:hover { background: var(--primary-color); color: var(--background-color); }
    
    .ai-answer-box { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 12px; color: white; line-height: 1.6; font-size: 18px; border-left: 5px solid var(--primary-color); margin-top: 20px; }

    @media (max-width: 767px) {
        body { flex-direction: column; }
        nav.sidebar { width: 100%; height: auto; position: relative; top: 0; }
        .content-area { margin-left: 0 ! encroachment; }
        .top-bar { flex-direction: column; }
        #search-input { width: 100%; }
    }
  </style>
</head>
<body>

  <header class="header">
    <h1>Нас уже 114 пользователей!</h1>
    <p>Спасибо, что вы с «Глобусом»</p>
  </header>

  <nav class="sidebar" id="sidebar">
    <button id="menu-toggle">«</button>
    <ul>
      <li><a href="#"><span>Главная</span></a></li>
      <li><a href="#"><span>О нас</span></a></li>
      <li><a href="#"><span>Новое</span></a></li>
      <li><a href="#"><span>Книги</span></a></li>
    </ul>
  </nav>

  <div class="content-area" id="content-area">
    <div class="top-bar">
      <div class="brand-section"><h1>Глобус</h1></div>
      <div class="search-section">
        <input id="search-input" type="text" placeholder="Поиск в Глобусе...">
        <button id="search-button">Найти</button>
      </div>
    </div>

    <main id="main">
      <div class="recommended-sites">
        <h2>Рекомендуемые сайты</h2>
        <div class="sites-list">
          <a href="https://topiq.kz/ru/" target="_blank" class="site-link">TopiQ</a>
          <a href="https://portal.kundelik.kz/ru/v2" target="_blank" class="site-link">Кунделик</a>
          <a href="https://ru.wikipedia.org/" target="_blank" class="site-link">Википедия</a>
        </div>
      </div>
      <p id="greeting">Глобус на связи.</p>
    </main>

    <footer>© Глобус. 2023-2026.</footer>
  </div>

  <div class="metrika-banner">
      <b>Яндекс Метрика:</b> мы собираем анонимные данные, чтобы улучшать поиск.
  </div>

  <script>
    const sidebar = document.getElementById('sidebar');
    const toggleButton = document.getElementById('menu-toggle');
    const contentArea = document.getElementById('content-area');

    toggleButton.addEventListener('click', () => {
        const isCollapsed = sidebar.classList.toggle('collapsed');
        contentArea.classList.toggle('shifted', isCollapsed);
        toggleButton.textContent = isCollapsed ? '»' : '«';
    });
  </script>
</body>
</html>
