<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добро пожаловать в Глобус!</title>
    <style>
        :root {
            --primary-color: #C0C0C0; 
            --background-color: #051937; 
            --secondary-color: #ffffff;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: var(--background-color);
            color: var(--secondary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .welcome-container {
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid var(--primary-color);
        }

        h1 {
            font-size: 48px;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .features {
            text-align: left;
            margin: 30px 0;
        }

        .feature-item {
            margin-bottom: 15px;
            font-size: 18px;
            line-height: 1.4;
        }

        .feature-item strong {
            color: var(--primary-color);
        }

        .start-button {
            display: inline-block;
            padding: 15px 40px;
            background-color: var(--primary-color);
            color: var(--background-color);
            text-decoration: none;
            font-weight: bold;
            font-size: 20px;
            border-radius: 30px;
            transition: 0.3s;
        }

        .start-button:hover {
            transform: scale(1.05);
            background-color: white;
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        <h1>Добро пожаловать в Глобус!</h1>
        
        <div class="features">
            <div class="feature-item">
                <strong>Почему мы?</strong> Глобус — это не просто поиск, это ваш персональный проводник по всей планете и за её пределами.
            </div>
            <div class="feature-item">
                <strong>Мы лучше конкурентов!</strong> Мы объединяем мощь нейросетей, быстрый поиск и удобный маркет в одном месте без лишней рекламы.
            </div>
        </div>

        <a href="../index.html" class="start-button">Начать!</a>
    </div>

</body>
</html>
