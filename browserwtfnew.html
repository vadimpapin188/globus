<!DOCTYPE html>
<html>
<head>
    <title>Глобус Змейка</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #000; }
        canvas { border: 2px solid #fff; background: #000; }
    </style>
</head>
<body>
<canvas id="game" width="400" height="400"></canvas>
<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const box = 20;
    let snake = [{x: 10 * box, y: 10 * box}];
    let food = { x: Math.floor(Math.random() * 20) * box, y: Math.floor(Math.random() * 20) * box };
    let dir = "RIGHT";

    // Управление для сенсорного экрана
    canvas.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        const x = touch.clientX - canvas.offsetLeft;
        const y = touch.clientY - canvas.offsetTop;
        if (Math.abs(x - snake[0].x) > Math.abs(y - snake[0].y)) {
            dir = (x > snake[0].x) ? "RIGHT" : "LEFT";
        } else {
            dir = (y > snake[0].y) ? "DOWN" : "UP";
        }
    });

    function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for(let i = 0; i < snake.length; i++) {
            ctx.fillStyle = (i == 0) ? "green" : "lime";
            ctx.fillRect(snake[i].x, snake[i].y, box, box);
        }

        ctx.fillStyle = "red";
        ctx.fillRect(food.x, food.y, box, box);

        let headX = snake[0].x;
        let headY = snake[0].y;

        if(dir == "LEFT") headX -= box;
        if(dir == "RIGHT") headX += box;
        if(dir == "UP") headY -= box;
        if(dir == "DOWN") headY += box;

        if(headX == food.x && headY == food.y) {
            food = { x: Math.floor(Math.random() * 20) * box, y: Math.floor(Math.random() * 20) * box };
        } else {
            snake.pop();
        }

        let newHead = { x: headX, y: headY };

        // Проигрыш при столкновении со стеной или собой
        if(headX < 0 || headX >= canvas.width || headY < 0 || headY >= canvas.height || collision(newHead, snake)) {
            location.reload(); 
        }

        snake.unshift(newHead);
    }

    function collision(head, array) {
        for(let i = 0; i < array.length; i++) {
            if(head.x == array[i].x && head.y == array[i].y) return true;
        }
        return false;
    }

    setInterval(draw, 150);
</script>
</body>
</html>
