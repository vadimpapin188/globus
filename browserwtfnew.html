<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pocket City: Hardcore</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
  
  <style>
    body {
      margin: 0;
      font-family: 'Varela Round', sans-serif;
      background-color: #a8d5e2;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      touch-action: manipulation;
    }

    .header {
      background-color: #ff9f1c;
      color: white;
      padding: 10px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .stats {
      display: flex;
      justify-content: space-around;
      background-color: #ffffff;
      padding: 10px;
      font-size: 20px;
      font-weight: bold;
    }
    .money { color: #2ec4b6; }
    .pop { color: #e71d36; }
    .happy { color: #ffb703; }

    .expand-btn {
      background-color: #9b59b6;
      color: white;
      text-align: center;
      padding: 12px;
      margin: 5px 15px 0 15px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 0 #8e44ad;
    }

    .map-container {
      flex-grow: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }
    .grid {
      display: grid;
      gap: 6px;
      width: 100%;
      max-width: 450px;
    }
    .cell {
      background-color: #81c784;
      border-radius: 10px;
      aspect-ratio: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,0.15);
      cursor: pointer;
    }

    .toolbar-container {
      background-color: #ffffff;
      box-shadow: 0 -4px 6px rgba(0,0,0,0.1);
      padding: 10px 0 25px 0;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 0 10px;
    }
    .tool {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #f1f2f6;
      border: 4px solid transparent;
      border-radius: 15px;
      padding: 10px;
      font-size: 16px;
      min-width: 75px;
      cursor: pointer;
    }
    .tool.active {
      border-color: #ff9f1c;
      background-color: #fff3e0;
    }
    .tool i { font-size: 26px; margin-bottom: 5px; }
    .cost { font-size: 14px; font-weight: bold; color: #2ec4b6; }

    /* Экран Конец Игры */
    .game-over-screen {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background-color: rgba(231, 29, 54, 0.95);
      color: white;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      font-size: 32px;
      font-weight: bold;
    }
    .restart-btn {
      background-color: white;
      color: #e71d36;
      padding: 15px 30px;
      border-radius: 15px;
      margin-top: 20px;
      font-size: 22px;
      cursor: pointer;
      border: none;
      font-family: 'Varela Round', sans-serif;
      font-weight: bold;
      box-shadow: 0 5px 0 #b31224;
    }
    .restart-btn:active {
      transform: translateY(2px);
      box-shadow: 0 3px 0 #b31224;
    }
  </style>
</head>
<body>

  <div class="game-over-screen" id="game-over">
    <div>💀 ГЕЙМ ОВЕР!</div>
    <div style="font-size: 20px; margin-top: 10px; padding: 0 20px; text-align: center;">Жители не выдержали плохой экологии и шума и покинули город!</div>
    <button class="restart-btn" onclick="restartGame()">Начать заново</button>
  </div>

  <div class="header">🏙️ Pocket City: Hardcore</div>
  
  <div class="stats">
    <div class="stat-item money"><i class="fa-solid fa-coins"></i> <span id="money-display">60</span></div>
    <div class="stat-item pop"><i class="fa-solid fa-users"></i> <span id="pop-display">0</span></div>
    <div class="stat-item happy"><span id="happy-icon">😀</span> <span id="happy-display">100</span>%</div>
  </div>

  <div class="expand-btn" onclick="expandMap()">
    <i class="fa-solid fa-map"></i> Расширить поле (Цена: $<span id="expand-cost">40</span>)
  </div>

  <div class="map-container">
    <div class="grid" id="grid"></div>
  </div>

  <div class="toolbar-container">
    <div class="toolbar">
      <div class="tool active" id="tool-house" onclick="selectTool('house')">
        <i class="fa-solid fa-house" style="color: #3498db;"></i>
        <div>Дом</div>
        <div class="cost">$10</div>
      </div>
      <div class="tool" id="tool-shop" onclick="selectTool('shop')">
        <i class="fa-solid fa-store" style="color: #e74c3c;"></i>
        <div>Магазин</div>
        <div class="cost">$25</div>
      </div>
      <div class="tool" id="tool-park" onclick="selectTool('park')">
        <i class="fa-solid fa-tree" style="color: #2ecc71;"></i>
        <div>Парк</div>
        <div class="cost">$8</div>
      </div>
      <div class="tool" id="tool-factory" onclick="selectTool('factory')">
        <i class="fa-solid fa-industry" style="color: #7f8c8d;"></i>
        <div>Завод</div>
        <div class="cost">$50</div>
      </div>
      <div class="tool" id="tool-hospital" onclick="selectTool('hospital')">
        <i class="fa-solid fa-hospital" style="color: #e67e22;"></i>
        <div>Больница</div>
        <div class="cost">$80</div>
      </div>
    </div>
  </div>

  <script>
    let money = 60;
    let isGameOver = false;
    let currentTool = 'house';
    
    let gridColumns = 4;
    let maxCells = 16; 
    let expandCost = 40;

    // Массив карты, где храним типы построек на каждой клетке
    let mapData = [];

    const tools = {
      house: { cost: 10, icon: '<i class="fa-solid fa-house" style="color: #3498db;"></i>' },
      shop: { cost: 25, icon: '<i class="fa-solid fa-store" style="color: #e74c3c;"></i>' },
      park: { cost: 8, icon: '<i class="fa-solid fa-tree" style="color: #2ecc71;"></i>' },
      factory: { cost: 50, icon: '<i class="fa-solid fa-industry" style="color: #7f8c8d;"></i>' },
      hospital: { cost: 80, icon: '<i class="fa-solid fa-hospital" style="color: #e67e22;"></i>' }
    };

    const gridEl = document.getElementById('grid');
    const moneyEl = document.getElementById('money-display');
    const popEl = document.getElementById('pop-display');
    const happyEl = document.getElementById('happy-display');
    const happyIconEl = document.getElementById('happy-icon');
    const expandCostEl = document.getElementById('expand-cost');
    const gameOverScreen = document.getElementById('game-over');

    function createMap() {
      gridEl.innerHTML = '';
      gridEl.style.gridTemplateColumns = `repeat(${gridColumns}, 1fr)`;
      
      // Переносим старые данные в новую сетку, заполняя новые клетки пустотой
      let oldData = [...mapData];
      mapData = new Array(maxCells).fill('');
      for(let i = 0; i < oldData.length; i++) {
        // Высчитываем координаты старых клеток, чтобы они не съехали
        let oldRow = Math.floor(i / (gridColumns - 1));
        let oldCol = i % (gridColumns - 1);
        let newIndex = oldRow * gridColumns + oldCol;
        mapData[newIndex] = oldData[i];
      }

      for (let i = 0; i < maxCells; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.index = i;
        if (mapData[i] !== '') {
          cell.innerHTML = tools[mapData[i]].icon;
        }
        cell.onclick = () => build(cell, i);
        gridEl.appendChild(cell);
      }
    }

    function expandMap() {
      if (isGameOver) return;
      if (money >= expandCost) {
        if (gridColumns < 6) {
          money -= expandCost;
          gridColumns++;
          maxCells = gridColumns * gridColumns;
          expandCost = Math.floor(expandCost * 3); 
          createMap();
          updateUI();
        } else {
          alert("Город достиг максимального размера!");
        }
      } else {
        alert("Не хватает денег!");
      }
    }

    function selectTool(toolName) {
      if (isGameOver) return;
      currentTool = toolName;
      document.querySelectorAll('.tool').forEach(el => el.classList.remove('active'));
      document.getElementById('tool-' + toolName).classList.add('active');
    }

    function build(cell, index) {
      if (isGameOver || mapData[index] !== '') return; 
      
      let tool = tools[currentTool];
      if (money >= tool.cost) {
        money -= tool.cost;
        mapData[index] = currentTool;
        cell.innerHTML = tool.icon;
        updateUI();
      }
    }

    // Поиск соседей вокруг клетки для проверки экологии
    function getNeighbors(index) {
      let neighbors = [];
      let row = Math.floor(index / gridColumns);
      let col = index % gridColumns;

      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          let r = row + dr;
          let c = col + dc;
          if (r >= 0 && r < gridColumns && c >= 0 && c < gridColumns) {
            neighbors.push(r * gridColumns + c);
          }
        }
      }
      return neighbors;
    }

    function calculateStats() {
      let totalIncome = 0;
      let totalPopulation = 0;
      let baseHappiness = 100;
      
      let houseCount = 0;
      let parkCount = 0;
      let hospitalCount = 0;
      
      // Считаем общее количество зданий
      for (let i = 0; i < maxCells; i++) {
        if (mapData[i] === 'house') houseCount++;
        if (mapData[i] === 'park') parkCount++;
        if (mapData[i] === 'hospital') hospitalCount++;
        if (mapData[i] === 'shop') totalIncome += 3;
        if (mapData[i] === 'factory') totalIncome += 12;
      }

      // Главный расчет штрафов за соседство
      let penalty = 0;
      for (let i = 0; i < maxCells; i++) {
        if (mapData[i] === 'house') {
          totalPopulation += 6;
          let neighbors = getNeighbors(i);
          
          neighbors.forEach(nIndex => {
            if (mapData[nIndex] === 'factory') {
              penalty += 20; // Огромный штраф за завод под окнами!
            }
            if (mapData[nIndex] === 'shop') {
              penalty += 8;  // Штраф за шумный магазин рядом!
            }
          });
        }
      }

      // Общий баланс парков
      let badPlaces = houseCount;
      let goodPlaces = parkCount + (hospitalCount * 2);
      if (badPlaces > goodPlaces) {
        penalty += (badPlaces - goodPlaces) * 15;
      }

      let finalHappiness = baseHappiness - penalty;
      if (finalHappiness > 100) finalHappiness = 100;
      if (finalHappiness < 0) finalHappiness = 0;

      // Если счастье 0 — это Гейм Овер
      if (finalHappiness === 0 && houseCount > 0) {
        triggerGameOver();
      }

      // Изменение населения от настроения
      let activePopulation = Math.floor(totalPopulation * (finalHappiness / 100));

      if (finalHappiness > 75) happyIconEl.innerText = '😀';
      else if (finalHappiness > 35) happyIconEl.innerText = '😐';
      else happyIconEl.innerText = '😡';

      return { happiness: finalHappiness, income: totalIncome, population: activePopulation };
    }

    function updateUI() {
      if (isGameOver) return;
      let stats = calculateStats();
      moneyEl.innerText = money;
      popEl.innerText = stats.population;
      happyEl.innerText = stats.happiness;
      expandCostEl.innerText = expandCost;
    }

    function triggerGameOver() {
      isGameOver = true;
      gameOverScreen.style.display = 'flex';
    }

    function restartGame() {
      money = 60;
      isGameOver = false;
      gridColumns = 4;
      maxCells = 16;
      expandCost = 40;
      mapData = [];
      gameOverScreen.style.display = 'none';
      selectTool('house');
      createMap();
      updateUI();
    }

    // Игровой цикл времени
    setInterval(() => {
      if (!isGameOver) {
        let stats = calculateStats();
        money += stats.income;
        updateUI();
      }
    }, 1000);

    createMap();
    updateUI();
  </script>
</body>
</html>
