<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>YouTown: Mega Evolution</title>
  <style>
    body { margin: 0; font-family: sans-serif; background-color: #a8d5e2; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .header { background-color: #2c3e50; color: white; padding: 10px; text-align: center; font-weight: bold; }
    .stats { display: flex; justify-content: space-around; background: #fff; padding: 10px; font-weight: bold; }
    .grid { display: grid; gap: 4px; padding: 10px; margin: 0 auto; width: 320px; }
    .cell { background: #81c784; border-radius: 8px; width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 24px; }
    .toolbar { display: flex; gap: 5px; padding: 10px; background: #fff; overflow-x: auto; }
    .tool { padding: 8px; background: #f1f2f6; border-radius: 8px; cursor: pointer; text-align: center; font-size: 11px; min-width: 50px; }
    .tool.active { border: 2px solid #ff9f1c; }
  </style>
</head>
<body>

<div class="header">YouTown: Мега-Эволюция</div>
<div class="stats">
  <div>💰 $<span id="money">150</span></div>
  <div>😊 <span id="happy">100</span>%</div>
</div>

<div class="grid" id="grid" style="grid-template-columns: repeat(4, 1fr);"></div>

<div class="toolbar" id="toolbar"></div>

<script>
  let money = 150, happiness = 100;
  let mapData = new Array(16).fill(null);
  let currentTool = 'house';

  const tools = {
    house: { name: 'Дом', cost: 10, icon: '🏠' },
    road: { name: 'Дорога', cost: 5, icon: '🛣️' },
    farm: { name: 'Ферма', cost: 30, icon: '🌾' },
    lab: { name: 'Лаб.', cost: 200, icon: '🧪' }
  };

  function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    mapData.forEach((type, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.innerText = type ? tools[type].icon : '';
      cell.onclick = () => {
        if (!mapData[i] && money >= tools[currentTool].cost) {
          money -= tools[currentTool].cost;
          mapData[i] = currentTool;
          render();
        }
      };
      grid.appendChild(cell);
    });
    document.getElementById('money').innerText = money;
    document.getElementById('happy').innerText = Math.floor(happiness);
  }

  // Основная логика
  setInterval(() => {
    let houses = 0, roads = 0, farms = 0, labs = 0;
    mapData.forEach(t => {
      if(t === 'house') houses++;
      if(t === 'road') roads++;
      if(t === 'farm') farms++;
      if(t === 'lab') labs++;
    });

    // Фермы (нужно 1 на 3 дома)
    if (houses > 0) {
      if (farms < Math.ceil(houses / 3)) happiness -= 0.5;
      else happiness += 0.2;
    }
    // Дороги (нужно 1 на 2 дома)
    if (houses > 0 && roads < Math.ceil(houses / 2)) happiness -= 0.3;
    
    // Лаборатория
    if (labs > 0 && Math.random() < 0.1) {
      let effect = Math.random() > 0.5 ? 20 : -20;
      happiness += effect;
      alert("Лаборатория провела эксперимент: " + (effect > 0 ? "Успех! +20%" : "Провал! -20%"));
    }

    happiness = Math.max(0, Math.min(100, happiness));
    render();
  }, 1000);

  // Создание кнопок
  const tb = document.getElementById('toolbar');
  for (let key in tools) {
    let el = document.createElement('div');
    el.className = 'tool';
    el.innerHTML = `${tools[key].icon}<br>${tools[key].name}`;
    el.onclick = () => {
      currentTool = key;
      document.querySelectorAll('.tool').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    };
    tb.appendChild(el);
  }
  render();
</script>
</body>
</html>
