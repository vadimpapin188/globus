<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>YouTown: Mega Evolution</title>
  <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
  <style>
    /* ТВОИ СТИЛИ ВОЗВРАЩЕНЫ */
    body { margin: 0; font-family: 'Varela Round', sans-serif; background-color: #a8d5e2; height: 100vh; overflow: hidden; }
    .header { background-color: #2c3e50; color: white; padding: 15px; text-align: center; font-size: 22px; font-weight: bold; }
    .stats { display: flex; justify-content: space-around; background-color: #ffffff; padding: 10px; font-weight: bold; }
    .grid { display: grid; gap: 6px; padding: 10px; max-width: 440px; margin: auto; }
    .cell { background-color: #81c784; border-radius: 10px; aspect-ratio: 1; display: flex; justify-content: center; align-items: center; font-size: 28px; }
    .toolbar-container { background-color: #ffffff; padding: 10px; overflow-x: auto; display: flex; gap: 10px; }
    .tool { display: flex; flex-direction: column; align-items: center; background: #f1f2f6; padding: 10px; border-radius: 12px; cursor: pointer; min-width: 70px; }
    .tool.active { border: 2px solid #ff9f1c; }
  </style>
</head>
<body>

  <div class="header">YouTown: Mega Evolution</div>
  <div class="stats">Money: $<span id="money-display">60</span></div>

  <div class="toolbar-container" id="toolbar">
    <div class="tool active" onclick="selectTool('house')">🏠<div>Дом</div></div>
    <div class="tool" onclick="selectTool('shop')">🏪<div>Маг</div></div>
  </div>

  <div class="grid" id="grid" style="grid-template-columns: repeat(4, 1fr);">
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
  </div>

  <script>
    // --- ДВИЖОК МОДОВ ---
    const ModEngine = {
        // Тот самый парсер, который понимает твой синтаксис
        parse(line) {
            if(line.startsWith("AddBuild")) {
                let name = line.match(/"([^"]+)"/)[1];
                let price = line.match(/~(\d+)/)[1];
                this.injectUI(name, price);
            }
        },
        injectUI(name, price) {
            const container = document.getElementById('toolbar');
            const el = document.createElement('div');
            el.className = 'tool';
            el.innerHTML = `📦<div>${name}</div><div style="color:#2ec4b6">$${price}</div>`;
            container.appendChild(el);
        }
    };

    // Твой мод
    let myMods = ['AddBuild("Завод x10" price ~100 scripts \'zavod\')'];
    myMods.forEach(cmd => ModEngine.parse(cmd));

    function selectTool(t) { /* логика выбора */ }
  </script>
</body>
</html>
