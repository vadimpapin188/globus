<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>YouTown: Mod-Ready Evolution</title>
  <style>
    /* (Твои стили без изменений) */
    body { margin:0; font-family: sans-serif; background: #a8d5e2; }
    .toolbar { display: flex; gap: 10px; overflow-x: auto; padding: 10px; background: white; }
    .tool { padding: 10px; background: #f1f2f6; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>

  <div class="header">YouTown: Mega Evolution</div>
  <div class="stats">Money: $<span id="money-display">60</span></div>
  <div class="toolbar" id="toolbar">
    </div>
  <div class="grid" id="grid"></div>

  <script>
    // --- ДВИЖОК ИГРЫ ---
    let money = 60;
    let tools = {
      house: { cost: 10, icon: '🏠' },
      shop: { cost: 25, icon: '🏪' }
    };

    // --- МОДИНГ API ---
    const EngineValue = {
        Set: (cmd) => {
            // Пример: EngineValue.Set(CreditPrice = ~500)
            let match = cmd.match(/(\w+)\s*=\s*~(\d+)/);
            if(match) {
                console.log(`Setting ${match[1]} to ${match[2]}`);
                // Тут логика применения переменных игры
            }
        }
    };

    const AddBuild = (name, cost, scriptRef) => {
        tools[name] = { cost: cost, icon: '📦', script: scriptRef };
        console.log(`Mod Building ${name} registered.`);
    };

    const PanelBuilds = {
        Add: (name) => {
            const container = document.getElementById('toolbar');
            const btn = document.createElement('div');
            btn.className = 'tool';
            btn.innerHTML = `${tools[name].icon} ${name}`;
            btn.onclick = () => console.log("Выбрано: " + name);
            container.appendChild(btn);
        }
    };

    // --- ПАРСЕР МОДОВ (Твой "язык Чирик") ---
    function executeModCommand(command) {
        if (command.startsWith("EngineValue.Set")) {
            EngineValue.Set(command.split('(')[1].replace(')', ''));
        } 
        else if (command.startsWith("AddBuild")) {
            // Парсим: AddBuild ("Завод x10" price ~100 scripts 'zavod')
            let name = command.match(/"([^"]+)"/)[1];
            let price = parseInt(command.match(/price\s*~(\d+)/)[1]);
            let script = command.match(/scripts\s*'([^']+)'/)[1];
            AddBuild(name, price, script);
        }
        else if (command.startsWith("PanelBuilds.Add")) {
            let name = command.match(/"([^"]+)"/)[1];
            PanelBuilds.Add(name);
        }
    }

    // --- ПРИМЕР ЗАГРУЗКИ МОДА ---
    let myCustomMod = [
        'AddBuild("Завод x10" price ~100 scripts \'zavodscripts\')',
        'PanelBuilds.Add("Завод x10")',
        'EngineValue.Set(CreditPrice = ~500)'
    ];

    // Инициализация модов
    myCustomMod.forEach(cmd => executeModCommand(cmd));

  </script>
</body>
</html>
