<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>YouTown: Hardcore Edition</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #a8d5e2; height: 100vh; display: flex; flex-direction: column; touch-action: manipulation; }
    .header { background: #2c3e50; color: white; padding: 10px; text-align: center; font-weight: bold; }
    .stats { display: flex; justify-content: space-around; background: #fff; padding: 10px; font-weight: bold; }
    .grid { display: grid; gap: 4px; padding: 10px; flex-grow: 1; grid-template-columns: repeat(4, 1fr); align-content: start; }
    .cell { background: #81c784; border-radius: 8px; aspect-ratio: 1; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 24px; position: relative; }
    .badge { position: absolute; bottom: 2px; right: 2px; background: #2c3e50; color: #fff; font-size: 10px; padding: 2px; border-radius: 4px; }
    .toolbar { display: flex; gap: 5px; padding: 10px; background: #fff; overflow-x: auto; }
    .tool { padding: 8px; background: #f1f2f6; border-radius: 8px; text-align: center; font-size: 11px; min-width: 50px; }
    .active { border: 2px solid #ff9f1c; background: #fff3e0; }
  </style>
</head>
<body>

<div class="header">YouTown: Полный контроль</div>
<div class="stats">
  <div>💰 $<span id="money">150</span></div>
  <div>😊 <span id="happy">100</span>%</div>
</div>

<div class="grid" id="grid"></div>
<div class="toolbar" id="toolbar"></div>

<script>
  let money = 150, happiness = 100;
  let map = new Array(16).fill(null);
  let levels = new Array(16).fill(1);
  let fires = new Array(16).fill(false);
  let currentTool = 'house';

  const tools = {
    house: { name: 'Дом', cost: 10, icon: '🏠' },
    shop: { name: 'Маг', cost: 25, icon: '🛒' },
    factory: { name: 'Завод', cost: 50, icon: '🏭' },
    road: { name: 'Дорога', cost: 5, icon: '🛣️' },
    farm: { name: 'Ферма', cost: 30, icon: '🌾' },
    lab: { name: 'Лаб.', cost: 200, icon: '🧪' }
  };

  function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    map.forEach((t, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (fires[i]) {
        cell.innerText = '🔥';
        cell.onclick = () => { if(money >= 20) { money -= 20; fires[i] = false; render(); } };
      } else {
        cell.innerText = t ? tools[t].icon : '';
        if (t === 'factory' && levels[i] > 1) {
          let b = document.createElement('div'); b.className = 'badge'; b.innerText = 'Lvl' + levels[i];
          cell.appendChild(b);
        }
        cell.onclick = () => {
          if (!t && money >= tools[currentTool].cost) {
            money -= tools[currentTool].cost;
            map[i] = currentTool;
          } else if (t === 'factory' && levels[i] < 2 && money >= 40) {
            money -= 40; levels[i]++;
          }
          render();
        };
      }
      grid.appendChild(cell);
    });
    document.getElementById('money').innerText = money;
    document.getElementById('happy').innerText = Math.floor(happiness);
  }

  setInterval(() => {
    let factories = 0, shops = 0;
    map.forEach(t => { if(t=='factory') factories++; if(t=='shop') shops++; });

    // Экономика
    if (shops > 0) {
      if (factories < 2) { /* Магазины не работают */ }
      else { money += shops * (factories * 2); }
    }

    // Катаклизм
    if (Math.random() < 0.05) {
      let idx = Math.floor(Math.random()*16);
      if(map[idx]) { fires[idx] = true; alert("Пожар! Потушите его нажатием на огонь!"); }
    }
    render();
  }, 2000);

  // Инициализация тулбара
  Object.keys(tools).forEach(key => {
    let el = document.createElement('div');
    el.className = 'tool';
    el.innerHTML = `${tools[key].icon}<br>${tools[key].name}`;
    el.onclick = () => { currentTool = key; document.querySelectorAll('.tool').forEach(t=>t.classList.remove('active')); el.classList.add('active'); };
    document.getElementById('toolbar').appendChild(el);
  });
  render();
</script>
</body>
</html>
