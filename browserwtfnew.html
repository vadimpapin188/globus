<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>YouTown: Полный Мэр</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #a8d5e2; height: 100vh; display: flex; flex-direction: column; }
    .header { background: #2c3e50; color: white; padding: 10px; text-align: center; font-weight: bold; }
    .news { background: #34495e; color: #f1c40f; padding: 5px; font-size: 12px; text-align: center; height: 15px; }
    .stats { display: flex; justify-content: space-around; background: #fff; padding: 8px; font-size: 12px; font-weight: bold; }
    .grid { display: grid; gap: 3px; padding: 5px; flex-grow: 1; align-content: start; grid-template-columns: repeat(4, 1fr); }
    .cell { background: #81c784; border-radius: 6px; aspect-ratio: 1; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 20px; position: relative; }
    .badge { position: absolute; bottom: 2px; right: 2px; background: #2c3e50; color: #fff; font-size: 8px; padding: 2px; }
    .toolbar { display: flex; gap: 4px; padding: 8px; background: #fff; overflow-x: auto; }
    .tool { padding: 8px; background: #f1f2f6; border-radius: 6px; text-align: center; font-size: 10px; min-width: 45px; }
  </style>
</head>
<body>

<div class="header">YouTown: Полный контроль</div>
<div id="news" class="news">Мэр, город ждет!</div>
<div class="stats">
  <div>💰$<span id="money">200</span></div>
  <div>😊<span id="happy">100</span>%</div>
  <div>👥<span id="pop">0</span></div>
</div>

<div class="grid" id="grid"></div>
<div class="toolbar" id="toolbar"></div>
<button onclick="alert('Ачивки: 1.Первые деньги ($1000) 2.Промышленник (Заводы+Дороги)')">🏆 Достижения</button>

<script>
  let money = 200, happy = 100, pop = 0;
  let map = new Array(16).fill(null);
  let levels = new Array(16).fill(1);
  let fires = new Array(16).fill(false);
  let cur = 'house';

  const tools = {
    house: { n: 'Дом', c: 10, i: '🏠' }, road: { n: 'Дор.', c: 5, i: '🛣️' },
    factory: { n: 'Зав.', c: 50, i: '🏭' }, farm: { n: 'Фер.', c: 30, i: '🌾' },
    shop: { n: 'Маг.', c: 25, i: '🛒' }, court: { n: 'Суд', c: 150, i: '⚖️' },
    tv: { n: 'Вышка', c: 500, i: '🗼' }
  };

  function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    map.forEach((t, i) => {
      let cell = document.createElement('div');
      cell.className = 'cell';
      if (fires[i]) {
        cell.innerText = '🔥';
        cell.onclick = () => { money -= 20; fires[i] = false; render(); };
      } else {
        cell.innerText = t ? tools[t].i : '';
        if (t === 'factory' && levels[i] > 1) cell.innerHTML += '<div class="badge">L2</div>';
        cell.onclick = () => {
          if (!t && money >= tools[cur].c) { money -= tools[cur].c; map[i] = cur; }
          else if (t === 'factory' && levels[i] < 2 && money >= 50) { money -= 50; levels[i]++; }
          render();
        };
      }
      grid.appendChild(cell);
    });
    document.getElementById('money').innerText = money;
    document.getElementById('happy').innerText = Math.floor(happy);
  }

  setInterval(() => {
    let h=0, r=0, f=0, shop=0, fact=0, court=0;
    map.forEach((t, i) => {
      if(t=='house') h++; if(t=='road') r++; if(t=='factory') fact++;
      if(t=='farm') f++; if(t=='shop') shop++; if(t=='court') court++;
    });

    if (h > 0 && r == 0) { happy -= 1; document.getElementById('news').innerText = "Домам нужны дороги!"; }
    if (shop > 0 && fact < 2) document.getElementById('news').innerText = "Магазинам нужны заводы!";
    if (f == 0) happy -= 0.5;
    if (court == 0) happy -= 0.2;
    
    if (Math.random() < 0.05) {
      let idx = Math.floor(Math.random()*16);
      if(map[idx]) { fires[idx] = true; document.getElementById('news').innerText = "ПОЖАР!"; }
    }

    happy = Math.max(0, Math.min(100, happy));
    money += (fact * (levels.reduce((a,b)=>a+b,0) * 2));
    render();
  }, 2000);

  Object.keys(tools).forEach(k => {
    let el = document.createElement('div');
    el.className = 'tool';
    el.innerHTML = `${tools[k].i}<br>${tools[k].n}`;
    el.onclick = () => cur = k;
    document.getElementById('toolbar').appendChild(el);
  });
  render();
</script>
</body>
</html>
