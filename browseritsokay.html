<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Bots Vertical Shooter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-font: 'Lilita One', cursive;
            --ui-bg: rgba(0, 0, 0, 0.6);
            --ui-border: #ffd700; /* Goldish */
            --text-color: #ffffff;
            --text-stroke: 2px #000000;
        }

        body {
            margin: 0;
            padding: 0;
            background: #121212;
            font-family: var(--primary-font);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: var(--text-color);
            user-select: none;
            -webkit-user-select: none;
        }

        /* Portrait Mobile Container */
        #game-container {
            position: relative;
            width: 100vw;
            max-width: 450px; /* Standard mobile portrait maxWidth */
            height: 100vh;
            max-height: 900px; /* Standard iPhone Pro Max height class */
            overflow: hidden;
            background: #222;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border: 4px solid #333;
            border-radius: 20px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Screens/Overlays */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 25, 0.9);
            z-index: 10;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        /* Brawl Stars Style Title */
        h1 {
            font-size: 3.5rem;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            color: #fff;
            -webkit-text-stroke: 3px #000;
            text-shadow: 0 6px 0 #c0392b, 0 10px 15px rgba(0,0,0,0.5);
            letter-spacing: 2px;
            transform: rotate(-3deg);
        }

        p {
            font-size: 1.4rem;
            margin-bottom: 40px;
            -webkit-text-stroke: 1px #000;
            max-width: 80%;
        }

        /* "Chunky" Brawl Stars Button */
        .btn {
            font-family: var(--primary-font);
            padding: 18px 50px;
            font-size: 1.8rem;
            text-transform: uppercase;
            color: white;
            background: linear-gradient(180deg, #f1c40f 0%, #f39c12 100%);
            border: none;
            border-radius: 15px;
            box-shadow: 0 8px 0 #b7791f, 0 10px 20px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: all 0.1s ease;
            -webkit-text-stroke: 1.5px #6e490a;
        }

        .btn:hover {
            background: linear-gradient(180deg, #ffe066 0%, #f39c12 100%);
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b7791f, 0 6px 10px rgba(0,0,0,0.5);
        }

        /* Top UI Header */
        #ui-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 5;
        }

        .ui-pill {
            background: var(--ui-bg);
            border: 3px solid #666;
            border-radius: 50px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            -webkit-text-stroke: 1px #000;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }

        /* Icons (Emulated with text for portability) */
        .icon {
            font-size: 1.4rem;
            -webkit-text-stroke: 0;
        }

        #hp-pill {
            border-color: #e74c3c;
            color: #ffcccc;
        }

        #score-pill {
            border-color: #f1c40f;
            color: #fffde0;
        }

        /* Map Banner Overlay */
        #map-banner-container {
            position: absolute;
            top: 80px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 4;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #map-banner-container.show {
            opacity: 1;
        }

        #map-banner {
            background: linear-gradient(90deg, transparent 0%, rgba(255,215,0,0.8) 50%, transparent 100%);
            color: #000;
            padding: 5px 40px;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-header">
            <div class="ui-pill" id="hp-pill">
                <span class="icon">❤️</span><span id="hp-val">3</span>
            </div>
            <div class="ui-pill" id="score-pill">
                <span class="icon">⭐</span><span id="score-val">0</span>
            </div>
        </div>

        <div id="map-banner-container">
            <div id="map-banner">Crystal Cavern</div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="start-screen" class="screen">
            <h1>Brawl<br>Bots</h1>
            <p>Drag to move. Auto-fire is ON. Destroy the bots before they reach the bottom!</p>
            <button class="btn" onclick="startGame()">Brawl!</button>
        </div>

        <div id="game-over-screen" class="screen hidden">
            <h1 style="color: #e74c3c; -webkit-text-stroke-color: #000; text-shadow: 0 6px 0 #7b241c;">Defeat</h1>
            <p>Score: <span id="final-score" style="color: #f1c40f; font-size: 2rem;">0</span></p>
            <button class="btn" onclick="startGame()">Replay</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // UI Elements
        const uiHeader = document.getElementById('ui-header');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const scoreVal = document.getElementById('score-val');
        const finalScore = document.getElementById('final-score');
        const hpVal = document.getElementById('hp-val');
        const mapBannerContainer = document.getElementById('map-banner-container');
        const mapBannerText = document.getElementById('map-banner');

        // Game logical resolution (higher for crisper graphics on high-res screens)
        const GW = 600; 
        const GH = 1000;
        
        // Match canvas internal resolution to logical resolution
        canvas.width = GW;
        canvas.height = GH;

        // Game State
        let gameActive = false;
        let score = 0;
        let hp = 3;
        let currentMapIndex = 0;
        let time = 0; // Global game time for animations
        let lastShotTime = 0;
        let botSpawnTimer = 0;
        let screenShake = 0;

        // Entities
        let player = { x: GW / 2, y: GH - 150, radius: 45 };
        let bullets = [];
        let bots = [];
        let particles = [];

        // Map Definitions (Colors & Visual Style)
        const maps = [
            { 
                name: "Crystal Cavern", 
                bgTop: "#2c3e50", bgBot: "#1c2833", 
                floor: "#34495e", floorDetail: "#f1c40f", // Gold crystals
                botColor: { main: "#c0392b", light: "#e74c3c" } // Red bots
            },
            { 
                name: "Neon City", 
                bgTop: "#130f40", bgBot: "#000000", 
                floor: "#1e272e", floorDetail: "#00d2d3", // Cyan lights
                botColor: { main: "#8e44ad", light: "#9b59b6" } // Purple bots
            },
            { 
                name: "Retropolis", 
                bgTop: "#e67e22", bgBot: "#a04000", 
                floor: "#d35400", floorDetail: "#ecf0f1", // White road lines
                botColor: { main: "#2c3e50", light: "#7f8c8d" } // Dark chrome bots
            }
        ];

        // --- Input Handling ---
        function getCanvasPoint(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            // Map CSS pixels back to internal canvas coordinates
            return (clientX - rect.left) * (GW / rect.width);
        }

        function handleMove(e) {
            if (!gameActive) return;
            const canvasX = getCanvasPoint(e);
            // Clamp within bounds with chunky padding
            player.x = Math.max(player.radius + 20, Math.min(GW - player.radius - 20, canvasX));
        }

        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', (e) => {
            handleMove(e);
            if(e.cancelable) e.preventDefault(); // Prevent scrolling
        }, { passive: false });

        // --- Core Game Functions ---
        function startGame() {
            score = 0;
            hp = 3;
            currentMapIndex = 0;
            bullets = [];
            bots = [];
            particles = [];
            player.x = GW / 2;
            
            updateUI();
            showMapBanner();

            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            uiHeader.classList.remove('hidden');
            
            gameActive = true;
            lastShotTime = performance.now();
        }

        function gameOver() {
            gameActive = false;
            finalScore.innerText = score;
            gameOverScreen.classList.remove('hidden');
            uiHeader.classList.add('hidden');
        }

        function updateUI() {
            scoreVal.innerText = score;
            hpVal.innerText = hp;
        }

        function showMapBanner() {
            const map = maps[currentMapIndex];
            mapBannerText.innerText = map.name;
            mapBannerContainer.classList.add('show');
            setTimeout(() => mapBannerContainer.classList.remove('show'), 2000);
        }

        // --- Visual Effects & Drawing Helpers ---

        // Draw a rounded rectangle path (essential for Brawl Stars look)
        function roundRect(x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath();
        }

        function createExplosion(x, y, color, count=10) {
            screenShake = 10;
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15,
                    radius: Math.random() * 10 + 5,
                    alpha: 1,
                    decay: Math.random() * 0.03 + 0.02,
                    color: color
                });
            }
        }

        // --- Game Loop: Update ---
        function update(dt) {
            if (!gameActive) return;
            time += dt;

            if (screenShake > 0) screenShake *= 0.9; // Decay shake

            const now = performance.now();

            // Auto-fire
            if (now - lastShotTime > 350) { // Slower, punchier fire rate
                bullets.push({ x: player.x, y: player.y - 60, radius: 12, speed: 18 });
                lastShotTime = now;
            }

            // Map Progression
            const nextMapScore = (currentMapIndex + 1) * 20;
            if (score >= nextMapScore && currentMapIndex < maps.length - 1) {
                currentMapIndex++;
                showMapBanner();
            }

            // Spawn Bots
            botSpawnTimer += dt;
            let spawnCooldown = Math.max(0.5, 2.0 - (score * 0.02)); 
            if (botSpawnTimer > spawnCooldown) {
                const size = Math.random() * 15 + 35;
                bots.push({
                    x: Math.random() * (GW - size * 2) + size,
                    y: -size,
                    radius: size,
                    speed: Math.random() * 1 + 2 + (currentMapIndex * 0.5),
                    hp: 1 + Math.floor(currentMapIndex * 0.5),
                    wobbleOffset: Math.random() * 100
                });
                botSpawnTimer = 0;
            }

            // Move Bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y < -20) bullets.splice(i, 1);
            }

            // Move Bots & Collisions
            const mapColors = maps[currentMapIndex].botColor;
            for (let i = bots.length - 1; i >= 0; i--) {
                const b = bots[i];
                b.y += b.speed;

                // Hit bottom
                if (b.y > GH + b.radius) {
                    bots.splice(i, 1);
                    hp--;
                    updateUI();
                    screenShake = 20; // Big shake on damage
                    if (hp <= 0) gameOver();
                    continue;
                }

                // Player collision
                const distPlayer = Math.hypot(b.x - player.x, b.y - player.y);
                if (distPlayer < b.radius + player.radius * 0.8) {
                    createExplosion(b.x, b.y, mapColors.light);
                    bots.splice(i, 1);
                    hp--;
                    updateUI();
                    if (hp <= 0) gameOver();
                    continue;
                }

                // Bullet collision
                for (let j = bullets.length - 1; j >= 0; j--) {
                    const blt = bullets[j];
                    const distBlt = Math.hypot(b.x - blt.x, b.y - blt.y);
                    if (distBlt < b.radius + blt.radius) {
                        bullets.splice(j, 1);
                        b.hp--;
                        
                        // Flash white on hit logic (visually handled in draw)
                        b.hitFlash = 5;

                        if (b.hp <= 0) {
                            createExplosion(b.x, b.y, mapColors.light);
                            score++;
                            updateUI();
                            bots.splice(i, 1);
                        }
                        break; // Bullet destroyed, stop checking other bullets for this bot
                    }
                }
                if(b.hitFlash > 0) b.hitFlash--;
            }

            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.5; // Gravity
                p.alpha -= p.decay;
                p.radius *= 0.98; // Shrink
                if (p.alpha <= 0 || p.radius < 1) particles.splice(i, 1);
            }
        }

        // --- Game Loop: Draw (The Graphic Overhaul) ---
        function draw() {
            const map = maps[currentMapIndex];

            ctx.save();
            
            // Apply Screen Shake
            if (screenShake > 0) {
                ctx.translate(Math.random() * screenShake - screenShake/2, Math.random() * screenShake - screenShake/2);
            }

            // 1. Background Gradient
            const bgGrad = ctx.createLinearGradient(0, 0, 0, GH);
            bgGrad.addColorStop(0, map.bgTop);
            bgGrad.addColorStop(1, map.bgBot);
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, GW, GH);

            // 2. Stylized Floor perspective
            ctx.fillStyle = map.floor;
            ctx.beginPath();
            ctx.moveTo(0, GH * 0.7);
            ctx.lineTo(GW, GH * 0.7);
            ctx.lineTo(GW * 1.2, GH); // Fake perspective widen
            ctx.lineTo(-GW * 0.2, GH);
            ctx.closePath();
            ctx.fill();

            // Floor Details (Crystals/Markings)
            ctx.fillStyle = map.floorDetail;
            ctx.globalAlpha = 0.3;
            for(let i=0; i<5; i++) {
                // Draw some chunky polygons as floor details
                ctx.beginPath();
                const dx = (i * 150 + (time * 50) % 150);
                const dy = GH * 0.75 + (i*30);
                roundRect(dx, dy, 50, 20, 5);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;


            // 3. Draw Particles (Behind entities)
            particles.forEach(p => {
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            // 4. Draw Player (Stylized Mech/Hero)
            drawPlayer(player.x, player.y);

            // 5. Draw Bullets (Glowing Plasma)
            bullets.forEach(b => {
                // Outer Glow
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#fff";
                
                // Cyan laser
                const bltGrad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.radius);
                bltGrad.addColorStop(0, "#fff");
                bltGrad.addColorStop(0.4, "#00d2d3");
                bltGrad.addColorStop(1, "rgba(0, 210, 211, 0)");
                
                ctx.fillStyle = bltGrad;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius * 1.5, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowBlur = 0; // Reset shadow
            });

            // 6. Draw Bots (Chunky Enemies)
            bots.forEach(b => {
                drawBot(b);
            });

            ctx.restore(); // Restore shake transform
        }

        function drawPlayer(x, y) {
            const r = player.radius;
            
            // Chunky Black Outline for everything
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 10;
            ctx.lineJoin = "round";

            // Add slight hover wobble
            const wobble = Math.sin(time * 5) * 5;
            const py = y + wobble;

            // Body (Chunky Green Armor)
            roundRect(x - r, py - r, r * 2, r * 2, 15);
            
            // Gradient fill
            const bodyGrad = ctx.createLinearGradient(x, py-r, x, py+r);
            bodyGrad.addColorStop(0, "#2ecc71"); // Light green
            bodyGrad.addColorStop(1, "#27ae60"); // Dark green
            ctx.fillStyle = bodyGrad;
            ctx.stroke();
            ctx.fill();

            // Face Mask/Visor
            ctx.fillStyle = "#2c3e50"; // Dark blue/grey
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 6;
            roundRect(x - r + 15, py - r + 20, r * 2 - 30, r - 10, 10);
            ctx.stroke();
            ctx.fill();

            // Glowing Eyes
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(x - 15, py - r + 45, 8, 0, Math.PI * 2);
            ctx.arc(x + 15, py - r + 45, 8, 0, Math.PI * 2);
            ctx.fill();

            // Gun Turret on top
            ctx.fillStyle = "#7f8c8d"; // Grey metal
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 8;
            roundRect(x - 15, py - r - 25, 30, 40, 5);
            ctx.stroke();
            ctx.fill();
            
            // Red laser sight dot
            ctx.fillStyle = "#e74c3c";
            ctx.beginPath(); ctx.arc(x, py - r - 15, 4, 0, Math.PI*2); ctx.fill();
        }

        function drawBot(b) {
            const mapColors = maps[currentMapIndex].botColor;
            
            // Apply flashing effect if hit
            if(b.hitFlash > 0) {
                ctx.fillStyle = "#fff";
                ctx.strokeStyle = "#fff";
            } else {
                // Gradient body
                const botGrad = ctx.createLinearGradient(b.x, b.y - b.radius, b.x, b.y + b.radius);
                botGrad.addColorStop(0, mapColors.light);
                botGrad.addColorStop(1, mapColors.main);
                ctx.fillStyle = botGrad;
                ctx.strokeStyle = "#000";
            }

            ctx.lineWidth = 8;
            ctx.lineJoin = "round";

            // Slight lateral wobble based on time + individual offset
            const wobbleX = Math.sin(time * 3 + b.wobbleOffset) * 10;
            const bx = b.x + wobbleX;

            // Spiky/Angry Head shape
            ctx.beginPath();
            ctx.moveTo(bx - b.radius, b.y);
            ctx.lineTo(bx - b.radius * 0.8, b.y - b.radius); // Spike left top
            ctx.lineTo(bx, b.y - b.radius * 0.5); // Center dip
            ctx.lineTo(bx + b.radius * 0.8, b.y - b.radius); // Spike right top
            ctx.lineTo(bx + b.radius, b.y);
            ctx.lineTo(bx + b.radius * 0.5, b.y + b.radius); // Bottom right
            ctx.lineTo(bx - b.radius * 0.5, b.y + b.radius); // Bottom left
            ctx.closePath();
            
            ctx.stroke();
            ctx.fill();

            // Angry Angry Eyes
            ctx.fillStyle = (b.hitFlash > 0) ? "#fff" : "#f1c40f"; // Yellow eyes
            ctx.beginPath();
            // Left eye angled down
            ctx.moveTo(bx - 20, b.y - 10); ctx.lineTo(bx - 5, b.y + 5); ctx.lineTo(bx - 25, b.y + 5); ctx.closePath();
            // Right eye angled down
            ctx.moveTo(bx + 20, b.y - 10); ctx.lineTo(bx + 5, b.y + 5); ctx.lineTo(bx + 25, b.y + 5); ctx.closePath();
            ctx.fill();
            
            // Black pupils
            ctx.fillStyle = "#000";
            if(b.hitFlash === 0) {
                ctx.beginPath(); ctx.arc(bx-15, b.y+1, 3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(bx+15, b.y+1, 3, 0, Math.PI*2); ctx.fill();
            }

            // HP Bar above bot (if damaged or higher tier)
            if (b.hp > 1 || currentMapIndex > 0) {
                const barW = b.radius * 1.5;
                const barH = 10;
                const bxStart = bx - barW/2;
                const byStart = b.y - b.radius - 20;
                
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                roundRect(bxStart, byStart, barW, barH, 5);
                ctx.fill();
                
                const maxHp = 1 + Math.floor(currentMapIndex * 0.5);
                const hpPct = b.hp / maxHp;
                ctx.fillStyle = "#2ecc71"; // Green hp
                if(hpPct < 0.5) ctx.fillStyle = "#f39c12"; // Orange
                
                roundRect(bxStart, byStart, barW * hpPct, barH, 5);
                ctx.fill();
            }
        }

        // --- Game Loop Engine ---
        let lastTime = performance.now();
        function loop() {
            const now = performance.now();
            const dt = (now - lastTime) / 1000; // Delta time in seconds
            lastTime = now;

            update(dt);
            draw();
            requestAnimationFrame(loop);
        }

        // Initialize
        loop();

    </script>
</body>
</html>
