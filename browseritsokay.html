<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cartoon Bot Shooter</title>
    <style>
        /* Fun, cartoonish fonts and styling */
        body {
            margin: 0;
            padding: 0;
            background: #1a1a2e;
            font-family: 'Arial Rounded MT Bold', 'Helvetica Rounded', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Vertical mobile screen container */
        #game-container {
            position: relative;
            width: 100vw;
            max-width: 430px;
            height: 100vh;
            max-height: 932px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            overflow: hidden;
            border: 4px solid #333;
            border-radius: 16px;
            background: #222;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Screen overlays (Start, Game Over) */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(20, 20, 40, 0.85);
            z-index: 10;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            color: #ffeb3b;
            text-shadow: 4px 4px 0px #e91e63;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #e0e0e0;
        }

        /* Bright, cartoon-style button */
        .btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            background: #4caf50;
            border: none;
            border-bottom: 6px solid #388e3c;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.1s;
            text-transform: uppercase;
        }

        .btn:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
        }

        /* In-game UI overlay */
        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            pointer-events: none;
            z-index: 5;
            text-shadow: 2px 2px 0px #000;
        }

        .ui-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.2);
        }

        #map-banner {
            color: #ffeb3b;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Top UI -->
        <div id="ui">
            <div class="ui-box">Score: <span id="score-val">0</span></div>
            <div class="ui-box" id="map-banner">Map 1: Candy Hills</div>
            <div class="ui-box">HP: <span id="hp-val">3</span></div>
        </div>

        <!-- Canvas for the action -->
        <canvas id="gameCanvas"></canvas>

        <!-- Start Screen -->
        <div id="start-screen" class="screen">
            <h1>BOT SMASHER</h1>
            <p>Drag or move your finger to dodge and destroy the bots!</p>
            <button class="btn" onclick="startGame()">Play</button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="screen hidden">
            <h1>GAME OVER</h1>
            <p>You did great! Total Score: <span id="final-score">0</span></p>
            <button class="btn" onclick="startGame()">Try Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // UI elements
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const scoreVal = document.getElementById('score-val');
        const finalScore = document.getElementById('final-score');
        const hpVal = document.getElementById('hp-val');
        const mapBanner = document.getElementById('map-banner');

        // Set internal game resolution
        const GAME_WIDTH = 400;
        const GAME_HEIGHT = 700;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;

        // Game state variables
        let gameActive = false;
        let score = 0;
        let hp = 3;
        let currentMapIndex = 0;
        let lastShotTime = 0;
        let botSpawnTimer = 0;

        // Game objects arrays
        let player = { x: 200, y: 600, radius: 25, speed: 15 };
        let bullets = [];
        let bots = [];
        let particles = [];

        // Definition of our cartoon maps
        const maps = [
            { name: "Map 1: Candy Hills", bg: "#7ed6df", ground: "#22a6b3", botColor: "#ff7675" },
            { name: "Map 2: Neon City", bg: "#2c3e50", ground: "#130f40", botColor: "#00d2d3" },
            { name: "Map 3: Volcano Zone", bg: "#ff7979", ground: "#4834d4", botColor: "#f9ca24" }
        ];

        // Input handling (Works for both mouse and touch screens)
        function handleMove(e) {
            if (!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            // Calculate relative X position inside the canvas boundary
            const canvasX = (clientX - rect.left) * (GAME_WIDTH / rect.width);
            
            // Keep player inside screen limits
            player.x = Math.max(player.radius, Math.min(GAME_WIDTH - player.radius, canvasX));
        }

        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove, { passive: false });

        function startGame() {
            // Reset state
            score = 0;
            hp = 3;
            currentMapIndex = 0;
            bullets = [];
            bots = [];
            particles = [];
            player.x = GAME_WIDTH / 2;
            
            scoreVal.innerText = score;
            hpVal.innerText = hp;
            mapBanner.innerText = maps[currentMapIndex].name;

            // Hide menus
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            
            gameActive = true;
            lastShotTime = performance.now();
            botSpawnTimer = 0;
        }

        function gameOver() {
            gameActive = false;
            finalScore.innerText = score;
            gameOverScreen.classList.remove('hidden');
        }

        // Create colorful explosion bursts
        function createExplosion(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    radius: Math.random() * 4 + 2,
                    alpha: 1,
                    color: color
                });
            }
        }

        // Main game logic update loop
        function update() {
            if (!gameActive) return;

            const now = performance.now();

            // 1. Auto-shooting mechanic (Fires a shot every 250 milliseconds)
            if (now - lastShotTime > 250) {
                bullets.push({ x: player.x, y: player.y - player.radius, radius: 6, speed: 10 });
                lastShotTime = now;
            }

            // 2. Map progression logic based on score milestones
            if (score > 15 && currentMapIndex === 0) {
                currentMapIndex = 1;
                mapBanner.innerText = maps[currentMapIndex].name;
            } else if (score > 40 && currentMapIndex === 1) {
                currentMapIndex = 2;
                mapBanner.innerText = maps[currentMapIndex].name;
            }

            // 3. Spawning enemy bots
            botSpawnTimer++;
            // Spawns faster as the player gets more points
            let spawnRate = Math.max(20, 50 - score * 0.5); 
            if (botSpawnTimer > spawnRate) {
                bots.push({
                    x: Math.random() * (GAME_WIDTH - 40) + 20,
                    y: -30,
                    radius: Math.random() * 6 + 16,
                    speed: Math.random() * 2 + 2 + (currentMapIndex * 0.5),
                    hp: currentMapIndex + 1
                });
                botSpawnTimer = 0;
            }

            // 4. Update bullets position
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y < 0) {
                    bullets.splice(i, 1);
                }
            }

            // 5. Update enemy bots position and manage damages
            for (let i = bots.length - 1; i >= 0; i--) {
                bots[i].y += bots[i].speed;

                // Check bot reaching bottom floor
                if (bots[i].y > GAME_HEIGHT + bots[i].radius) {
                    bots.splice(i, 1);
                    hp--;
                    hpVal.innerText = hp;
                    if (hp <= 0) gameOver();
                    continue;
                }

                // Check collision with player character
                const distToPlayer = Math.hypot(bots[i].x - player.x, bots[i].y - player.y);
                if (distToPlayer < bots[i].radius + player.radius) {
                    createExplosion(bots[i].x, bots[i].y, '#ff4757');
                    bots.splice(i, 1);
                    hp--;
                    hpVal.innerText = hp;
                    if (hp <= 0) gameOver();
                    continue;
                }

                // Check collisions with bullets
                for (let j = bullets.length - 1; j >= 0; j--) {
                    const distToBullet = Math.hypot(bots[i].x - bullets[j].x, bots[i].y - bullets[j].y);
                    if (distToBullet < bots[i].radius + bullets[j].radius) {
                        bullets.splice(j, 1);
                        bots[i].hp--;

                        if (bots[i].hp <= 0) {
                            createExplosion(bots[i].x, bots[i].y, maps[currentMapIndex].botColor);
                            score++;
                            scoreVal.innerText = score;
                            bots.splice(i, 1);
                        }
                        break;
                    }
                }
            }

            // 6. Update visual explosion particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].alpha -= 0.04;
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        // Draw everything onto the screen canvas
        function draw() {
            const currentMap = maps[currentMapIndex];

            // Clean canvas background
            ctx.fillStyle = currentMap.bg;
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // Draw cartoon ground details at bottom half
            ctx.fillStyle = currentMap.ground;
            ctx.fillRect(0, GAME_HEIGHT - 80, GAME_WIDTH, 80);

            // Draw active particles
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            // Draw player character (Cute green cartoon space ship)
            ctx.fillStyle = '#2ed573';
            ctx.strokeStyle = '#1e90ff';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Cute big eyes for our character player
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(player.x - 8, player.y - 4, 6, 0, Math.PI * 2);
            ctx.arc(player.x + 8, player.y - 4, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(player.x - 8, player.y - 6, 3, 0, Math.PI * 2);
            ctx.arc(player.x + 8, player.y - 6, 3, 0, Math.PI * 2);
            ctx.fill();

            // Draw laser bullets
            ctx.fillStyle = '#fff200';
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw funny enemy bots
            bots.forEach(bot => {
                ctx.fillStyle = currentMap.botColor;
                ctx.strokeStyle = '#2f3542';
                ctx.lineWidth = 4;
                
                // Boxy body shape
                ctx.beginPath();
                ctx.roundRect(bot.x - bot.radius, bot.y - bot.radius, bot.radius * 2, bot.radius * 2, 8);
                ctx.fill();
                ctx.stroke();

                // Simple angry eyes for the bots
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(bot.x - bot.radius + 6, bot.y - 4, 6, 6);
                ctx.fillRect(bot.x + bot.radius - 12, bot.y - 4, 6, 6);
                ctx.fillStyle = '#000000';
                ctx.fillRect(bot.x - bot.radius + 8, bot.y - 2, 3, 3);
                ctx.fillRect(bot.x + bot.radius - 10, bot.y - 2, 3, 3);
            });
        }

        // Loop engine activation loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start running the loop
        gameLoop();
    </script>
</body>
</html>
