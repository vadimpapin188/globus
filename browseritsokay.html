<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Bots: Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial', sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; }
        .menu-btn { background: #f1c40f; border: none; padding: 10px; margin: 5px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <div id="my-id">ID: загрузка...</div>
    <input type="text" id="peer-id" placeholder="ID друга">
    <button class="menu-btn" onclick="connectToFriend()">Подключиться</button>
    <hr>
    <button class="menu-btn" onclick="player.skin='hero'">Герой</button>
    <button class="menu-btn" onclick="player.skin='fire'">Огонь</button>
    <button class="menu-btn" onclick="setMap('arena')">Арена</button>
    <button class="menu-btn" onclick="setMap('forest')">Лес</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 800;

    // Настройки
    let player = { x: 400, y: 400, skin: 'hero', map: 'arena' };
    let remotePlayer = null;
    
    // Скины
    const skins = {
        hero: { body: '#2ecc71', detail: '#27ae60' },
        fire: { body: '#e74c3c', detail: '#c0392b' }
    };

    // Мультиплеер
    const peer = new Peer();
    let conn = null;
    peer.on('open', id => document.getElementById('my-id').innerText = "ID: " + id);
    peer.on('connection', c => { conn = c; setupConn(); });

    function connectToFriend() {
        conn = peer.connect(document.getElementById('peer-id').value);
        setupConn();
    }

    function setupConn() {
        conn.on('data', data => {
            if(data.type === 'update') { remotePlayer = data.player; }
        });
    }

    function setMap(mapName) { player.map = mapName; }

    // Управление (WASD)
    window.addEventListener('keydown', e => {
        if(e.key === 'w') player.y -= 20;
        if(e.key === 's') player.y += 20;
        if(e.key === 'a') player.x -= 20;
        if(e.key === 'd') player.x += 20;
        
        if(conn && conn.open) conn.send({ type: 'update', player: player });
    });

    function drawPlayer(p, isRemote) {
        const s = skins[p.skin] || skins.hero;
        ctx.fillStyle = s.body;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 30, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = s.detail;
        ctx.lineWidth = 5;
        ctx.stroke();
    }

    function loop() {
        // Отрисовка карты
        ctx.fillStyle = player.map === 'arena' ? '#2c3e50' : '#27ae60';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Отрисовка игроков
        drawPlayer(player, false);
        if(remotePlayer) drawPlayer(remotePlayer, true);

        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
