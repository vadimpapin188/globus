<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Brawl Bots: P2P Multiplayer</title>
    <!-- Подключаем PeerJS напрямую -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #222; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; }
        #menu { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>

<div id="menu">
    <h3 id="my-id">ID: Загрузка...</h3>
    <button onclick="becomeHost()">Создать игру</button>
    <input type="text" id="peer-id" placeholder="ID друга">
    <button onclick="connectToFriend()">Подключиться</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let peer = new Peer(); // Создаем объект соединения
    let conn = null;
    let player = { x: 100, y: 100, color: 'blue' };
    let remotePlayer = { x: 300, y: 300, color: 'red' };

    peer.on('open', (id) => document.getElementById('my-id').innerText = "Твой ID: " + id);

    // Слушаем входящие соединения
    peer.on('connection', (c) => {
        conn = c;
        setupConnection();
    });

    function becomeHost() { alert("Ты хост! Жди друга."); }

    function connectToFriend() {
        const id = document.getElementById('peer-id').value;
        conn = peer.connect(id);
        setupConnection();
    }

    function setupConnection() {
        conn.on('data', (data) => {
            remotePlayer.x = data.x;
            remotePlayer.y = data.y;
        });
    }

    // Управление
    window.addEventListener('keydown', (e) => {
        if(e.key === 'w') player.y -= 20;
        if(e.key === 's') player.y += 20;
        if(e.key === 'a') player.x -= 20;
        if(e.key === 'd') player.x += 20;
        
        // Шлем координаты другу
        if (conn && conn.open) {
            conn.send({ x: player.x, y: player.y });
        }
    });

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Рисуем себя
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, 50, 50);
        
        // Рисуем друга
        ctx.fillStyle = remotePlayer.color;
        ctx.fillRect(remotePlayer.x, remotePlayer.y, 50, 50);
        
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
